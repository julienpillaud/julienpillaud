name: 🧪 Tests

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
  push:
    branches:
      - main

jobs:

  tests:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:8.2
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install the project
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest
