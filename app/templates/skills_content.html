<div class="flex flex-col gap-1">

  <div class="flex flex-col gap-1" x-sort="sortSkills">
    <template x-for="skill in category.skills" :key="skill.id">
      <div class="card bg-base-100 shadow" x-sort:item="skill.id">
        <div class="card-body p-2">
          <div class="flex gap-2 items-center group">
            <!-- Sort button -->
            <button class="cursor-move p-1" x-sort:handle>
              <i class="bi bi-grip-vertical"></i>
            </button>
            <!-- Skill name -->
            <span
              class="flex-1"
              x-show="editingSkillId !== skill.id"
              x-text="skill.name"
            >
            </span>
            <template x-if="editingSkillId === skill.id">
              <input
                type="text"
                class="input input-sm flex-1"
                x-model="skill.name"
                x-effect="$nextTick(() => $el.focus())"
                @keydown.enter="saveSkill(category, skill)"
                @keydown.escape="saveSkill(category, skill)"
                @blur="saveSkill(category, skill)"
              />
            </template>
            <!-- Actions buttons -->
            <div class="opacity-0 group-hover:opacity-100 flex gap-1">
              <button
                class="btn btn-square btn-xs btn-error"
                @click="removeSkill(category, skill)"
              >
                <i class="bi bi-trash"></i>
              </button>
            </div>
            <!-- ---------------- -->
          </div>
        </div>
      </div>
    </template>
  </div>

  <button class="btn btn-sm w-full" @click="addSkill(category)">
    <i class="bi bi-plus-lg"></i>
    Nouvelle compétence
  </button>

</div>
