{% extends "base.html" %}

{% block title %}
  Admin
{% endblock %}

{% block content %}
  {% include "navbar.html" %}

  <main
    class="max-w-2xl mx-auto flex flex-col gap-2 px-2 py-2"
    x-data="resumeSkills"
  >

    <div class="card">
      <div class="card-body p-3">

        <div class="card-actions justify-end">

          <div class="flex gap-2">
            <input
              type="text"
              class="input input-bordered input-sm"
              x-model="newCategoryName"
              @keyup.enter="addCategory()"
            />
            <button class="btn btn-sm btn-success" @click="addCategory()">
              <i class="bi bi-plus-lg"></i>
              Nouvelle catégorie
            </button>
          </div>

        </div>

        {# ================================================================== #}
        <template x-for="(skillsGroup, index) in skills" :key="skillsGroup.id">
          <div class="flex gap-1 bg-base-200 rounded-box border border-base-300">
            <div class="flex-1">
              <div class="collapse collapse-arrow">
                <input type="checkbox"/>
                <div
                  class="collapse-title text-base font-semibold"
                  x-text="`${index + 1}. ${skillsGroup.category_name}`"
                >
                </div>
                <div class="collapse-content">
                  <ul>

                    <template x-for="(skill, index) in skillsGroup.skills" :key="skill.id">
                      <li class="border-b border-base-300 p-1">
                        <div class="group flex items-center gap-2">
                          <span class="text-xs" x-text="index + 1"></span>
                          <input
                            type="text"
                            class="input input-ghost input-sm focus:bg-base-100 focus:outline-none flex-1 text-sm"
                            x-model="skill.name"
                            @input="updateSkill(skillsGroup.id, skill.id, skill.name)"
                          />
                          <button
                            class="btn btn-sm btn-square btn-error opacity-0 group-hover:opacity-100"
                            @click="removeSkill(skillsGroup.id, skill.id)"
                          >
                            <i class="bi bi-dash"></i>
                          </button>
                        </div>
                      </li>
                    </template>

                    <li class="border-b border-base-300 p-1">
                      <div class="group flex items-center gap-2">
                        <input
                          type="text"
                          placeholder="Ajouter un item..."
                          class="input input-bordered input-sm flex-1 border-dashed focus:outline-none"
                          x-model="newSkillName"
                        />
                        <button
                          class="btn btn-sm btn-dash btn-square"
                          @click="addSkill(skillsGroup.id)"
                        >
                          <i class="bi bi-plus-lg"></i>
                        </button>
                      </div>
                    </li>

                  </ul>
                </div>
              </div>
            </div>
            <div class="flex gap-1 py-3 pr-2">
              <button class="btn btn-sm btn-square rounded-md">
                <i class="bi bi-three-dots"></i>
              </button>
              <button
                class="btn btn-sm btn-square bg-error rounded-md"
                @click="removeCategory(skillsGroup.id)"
              >
                <i class="bi bi-dash"></i>
              </button>
            </div>
          </div>
        </template>
        {# ================================================================== #}

      </div>
    </div>
  </main>

{% endblock %}
