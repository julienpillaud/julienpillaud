{% extends "base.html" %}

{% block title %}Admin{% endblock %}

{% block content %}
  {% include "navbar.html" %}

  <main class="max-w-2xl mx-auto px-2 py-6 flex flex-col gap-6">
    <h1 class="text-2xl font-bold">Administration</h1>

    <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">

      <a class="card bg-base-200 border border-base-300 hover:border-primary hover:bg-base-300 transition-colors">
        <div class="card-body p-4 gap-2">
          <i class="bi bi-person text-2xl text-primary"></i>
          <span class="font-semibold">Profil</span>
        </div>
      </a>

      <a href="/admin/skills" class="card bg-base-200 border border-base-300 hover:border-primary hover:bg-base-300 transition-colors">
        <div class="card-body p-4 gap-2">
          <i class="bi bi-tools text-2xl text-primary"></i>
          <span class="font-semibold">Compétences</span>
        </div>
      </a>

      <a class="card bg-base-200 border border-base-300 hover:border-primary hover:bg-base-300 transition-colors">
        <div class="card-body p-4 gap-2">
          <i class="bi bi-briefcase text-2xl text-primary"></i>
          <span class="font-semibold">Expériences</span>
        </div>
      </a>

      <a class="card bg-base-200 border border-base-300 hover:border-primary hover:bg-base-300 transition-colors">
        <div class="card-body p-4 gap-2">
          <i class="bi bi-mortarboard text-2xl text-primary"></i>
          <span class="font-semibold">Formation</span>
        </div>
      </a>

      <a class="card bg-base-200 border border-base-300 hover:border-primary hover:bg-base-300 transition-colors">
        <div class="card-body p-4 gap-2">
          <i class="bi bi-translate text-2xl text-primary"></i>
          <span class="font-semibold">Langues</span>
        </div>
      </a>

    </div>

    <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
      <a href="/admin/pdf" class="card bg-base-200 border border-base-300 hover:border-secondary hover:bg-base-300 transition-colors">
        <div class="card-body p-4 gap-2">
          <i class="bi bi-filetype-pdf text-2xl text-secondary"></i>
          <span class="font-semibold">Prévisualisation PDF</span>
        </div>
      </a>
    </div>

  </main>

{% endblock %}
