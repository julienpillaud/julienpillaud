<!DOCTYPE html>
<html lang="fr" data-theme="winter">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV - {{ resume.metadata.contact.full_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css"/>

  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
      document.documentElement.setAttribute('data-theme', savedTheme)
    }
  </script>

</head>

<body class="bg-base-300 p-2 md:p-4 min-h-screen">

<div class="fixed top-4 right-4 z-50">
  {% include "_swap_theme.html" %}
</div>

<main class="max-w-4xl mx-auto flex flex-col gap-2 md:gap-4">

  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_infos.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_skills.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_experiences.html" %}
    </div>
  </div>


  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_education.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_languages.html" %}
    </div>
  </div>


</main>
</body>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script>
  const themeController = document.querySelector('.theme-controller');
  const currentTheme = localStorage.getItem('theme');
  themeController.checked = currentTheme === themeController.value;
  themeController.addEventListener("change", (event) => {
    const selectedTheme = event.target.checked ? event.target.value : "winter";
    document.documentElement.setAttribute("data-theme", selectedTheme);
    localStorage.setItem("theme", selectedTheme);
  })
</script>
</html>
