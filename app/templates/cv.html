<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ resume.metadata.contact.full_name }}</title>

  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='favicon/apple-touch-icon.png') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', path='favicon/favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', path='favicon/favicon-16x16.png') }}">

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css"/>

  <script>
    {# Set the theme value before everything #}
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const theme = savedTheme || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem("theme", theme);
  </script>

</head>

<body class="bg-base-300 min-h-screen">

<nav class="w-full bg-base-200 shadow sticky top-0 z-50">
  <div class="flex justify-end p-4">
    {% include "_swap_theme.html" %}
  </div>
</nav>

<main class="max-w-4xl mx-auto flex flex-col gap-2 md:gap-4 p-2 md:p-4">

  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_infos.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_skills.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_experiences.html" %}
    </div>
  </div>


  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_education.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-2 md:p-4">
      {% include "_card_languages.html" %}
    </div>
  </div>


</main>
</body>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script>
  const themeController = document.querySelector('.theme-controller');
  const currentTheme = localStorage.getItem('theme');
  themeController.checked = currentTheme === themeController.value;
  themeController.addEventListener("change", (event) => {
    const selectedTheme = event.target.checked ? event.target.value : "light";
    document.documentElement.setAttribute("data-theme", selectedTheme);
    localStorage.setItem("theme", selectedTheme);
  })
</script>
</html>
