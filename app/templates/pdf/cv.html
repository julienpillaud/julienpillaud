<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Preview PDF</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <style>
    body {
      margin: 0;
      padding: 40px 0;
      box-sizing: border-box;
      background: #888;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .pdf {
      width: 210mm;
      min-height: 297mm;
      background: white;
    }

    @page {
      size: A4;
    }

    @media print {
      body {
        padding: 0;
      }

      .border-primary {
        border-color: rgba(0, 0, 0, 0.3) !important;
        color: inherit !important;
      }

      .card {
        break-after: avoid;
      }
    }

  </style>
</head>
<body>

<div class="pdf">
  <div class="content p-6">

    <div class="card">
      <div class="card-body p-2 md:p-4">
        {% include "pdf/_card_infos.html" %}
      </div>
    </div>

    <div class="divider m-0"></div>

    <div class="card">
      <div class="card-body p-2 md:p-4">
        {% include "_card_skills.html" %}
      </div>
    </div>

    <div class="divider m-0"></div>

    <div class="card">
      <div class="card-body p-2 md:p-4">
        {% include "pdf/_card_experiences.html" %}
      </div>
    </div>

    <div class="divider m-0"></div>

    <div class="card">
      <div class="card-body p-2 md:p-4">
        {% include "_card_education.html" %}
      </div>
    </div>

    <div class="divider m-0"></div>

    <div class="card">
      <div class="card-body p-2 md:p-4">
        {% include "_card_languages.html" %}
      </div>
    </div>

  </div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</html>
