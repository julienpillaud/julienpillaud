<div class="flex justify-between items-center">
  <h1 class="text-2xl font-extrabold text-base-content">
    {{ resume.metadata.contact.full_name }}
  </h1>
  {% if resume.metadata.contact.available %}
    <div class="flex items-center gap-2 text-sm">
      <div class="status status-success animate-bounce"></div>
      <div class="badge badge-outline badge-success">Disponible</div>
    </div>
  {% endif %}
</div>

<p class="text-lg font-medium text-base-content/70">
  {{ resume.metadata.contact.job_title }}
</p>

<div class="flex gap-6">
  <a
    href="mailto:{{ resume.metadata.contact.email }}"
    class="btn btn-circle btn-soft"
  >
    <i class="bi bi-envelope text-secondary"></i>
  </a>
  <a
    href="https://github.com/{{ resume.metadata.contact.github_username }}"
    target="_blank"
    class="btn btn-circle btn-soft"
  >
    <i class="bi bi-github text-secondary"></i>
  </a>
  <a
    href="https://www.linkedin.com/in/{{ resume.metadata.contact.linkedin_username }}"
    target="_blank"
    class="btn btn-circle btn-soft"
  >
    <i class="bi bi-linkedin text-secondary"></i>
  </a>
</div>
