<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ resume.metadata.contact.full_name }}</title>

  <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">

  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='favicon/apple-touch-icon.png') }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', path='favicon/favicon-32x32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', path='favicon/favicon-16x16.png') }}">

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css"/>

  {# Set the theme value before everything #}
  <script src="{{ url_for('static', path='js/init-theme.js') }}"></script>
</head>

<body class="bg-base-300 min-h-screen">
{% include "html/_navbar.html" %}
<main class="max-w-4xl mx-auto flex flex-col gap-2 md:gap-4 px-3 py-4">

  <div class="card bg-base-200 shadow">
    <div class="card-body p-3">
      {% include "html/_card_infos.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-3">
      {% include "_card_skills.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-3">
      {% include "html/_card_experiences.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-3">
      {% include "_card_education.html" %}
    </div>
  </div>

  <div class="card bg-base-200 shadow">
    <div class="card-body p-3">
      {% include "_card_languages.html" %}
    </div>
  </div>

</main>
</body>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script type="module" src="{{ url_for('static', path='js/main.js') }}"></script>
</html>
