<h2 class="card-title uppercase opacity-50">Compétences</h2>
<ul class="space-y-3">
  {% for category, techs in resume.skills.items() %}
    <li>
      <p class="text-sm font-medium mb-2">{{ category }}</p>
      <div class="flex flex-wrap gap-2">
        {% for tech in techs %}
          <span class="px-2 py-0 text-primary rounded border border-primary">
            {{ tech.technology }}
          </span>
        {% endfor %}
      </div>
    </li>
  {% endfor %}
</ul>
