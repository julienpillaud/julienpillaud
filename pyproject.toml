[project]
name = "julienpillaud"
# use dynamic version to avoid sync issues with uv.lock after 'release-please'
dynamic = ["version"]
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.135",
    "httptools>=0.7",
    "jinja2>=3.1",
    "logfire[fastapi]>=4.31",
    "pydantic-settings>=2.13",
    "pydantic[email]>=2.12",
    "pymongo>=4.16",
    "uvicorn>=0.41",
    "uvloop>=0.22",
]

[dependency-groups]
dev = [
    "mypy>=1.19",
    "pre-commit>=4.5",
    "ruff>=0.15",
    "watchfiles>=1.1",
]

[tool.ruff]
output-format = "concise"

[tool.ruff.lint]
select = [
    "E", "W", # pycodestyle
    "F", # Pyflakes
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "SIM", # flake8-simplify
    "I", # isort
    "PL", # Pylint
    "RUF",
]

[tool.mypy]
strict = true
disable_error_code = [
    # Decorators on top of @property are not supported,
    # but pydantic use it
    "prop-decorator"
]
plugins = ['pydantic.mypy']
