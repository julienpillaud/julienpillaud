[project]
name = "julienpillaud"
version = "0.2.0"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.135",
    # Server
    "gunicorn>=25.1",
    "httptools>=0.7",
    "uvicorn-worker>=0.4",
    "uvloop>=0.22",
]

[dependency-groups]
dev = [
    "mypy>=1.19",
    "pre-commit>=4.5",
    "ruff>=0.15",
    # Server
    "uvicorn>=0.41",
    "watchfiles>=1.1",
]

[tool.ruff]
output-format = "concise"

[tool.ruff.lint]
select = [
    "E", "W", # pycodestyle
    "F", # Pyflakes
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "SIM", # flake8-simplify
    "I", # isort
    "PL", # Pylint
    "RUF",
]

[tool.mypy]
strict = true
plugins = ['pydantic.mypy']
