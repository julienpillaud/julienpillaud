[project]
name = "julienpillaud"
# use dynamic version to avoid sync issues with uv.lock after 'release-please'
dynamic = ["version"]
requires-python = ">=3.14"
dependencies = [
    "fastapi==0.135.2",
    "httptools==0.7.1",
    "jinja2==3.1.6",
    "logfire[fastapi]==4.31.0",
    "pydantic-settings==2.13.1",
    "pymongo==4.16.0",
    "uvicorn==0.42.0",
    "uvloop==0.22.1",
]

[dependency-groups]
dev = [
    "mypy==1.19.1",
    "pre-commit==4.5.1",
    "ruff==0.15.8",
    "watchfiles==1.1.1",
]

[tool.ruff]
output-format = "concise"

[tool.ruff.lint]
select = [
    "E", "W", # pycodestyle
    "F", # Pyflakes
    "UP", # pyupgrade
    "B", # flake8-bugbear
    "SIM", # flake8-simplify
    "I", # isort
    "PL", # Pylint
    "RUF",
]

[tool.mypy]
strict = true
disable_error_code = [
    # Decorators on top of @property are not supported,
    # but pydantic use it
    "prop-decorator"
]
plugins = ['pydantic.mypy']
